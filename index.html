<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的生活日記</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;700&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
:root {
  --cream: #FAF7F2;
  --warm-white: #FFFDF9;
  --ink: #1C1A18;
  --ink-soft: #4A4540;
  --ink-muted: #8C877F;
  --ink-faint: #C4BFB8;
  --accent: #8B6F47;
  --accent-light: #D4B896;
  --accent-pale: #F0E8DC;
  --green: #5C7A5C;
  --green-pale: #E8F0E8;
  --red-pale: #F5E8E8;
  --red: #8B4040;
  --border: rgba(139,111,71,0.15);
  --shadow: rgba(28,26,24,0.06);
  --radius: 12px;
  --radius-sm: 8px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Noto Sans TC', sans-serif;
  background: var(--cream);
  color: var(--ink);
  min-height: 100vh;
  font-weight: 300;
}

/* ── Layout ── */
.app { display: flex; height: 100vh; overflow: hidden; position: relative; }

.sidebar {
  width: 280px;
  flex-shrink: 0;
  background: var(--warm-white);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  z-index: 90;
  transition: transform 0.3s ease;
}

.main {
  flex: 1;
  overflow-y: auto;
  background: var(--cream);
}

/* 側欄遮罩 */
.sidebar-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(28,26,24,0.3);
  z-index: 85;
  pointer-events: none;
}
.sidebar-overlay.open { display: block; pointer-events: auto; }

/* ── Sidebar Header ── */
.sidebar-header {
  padding: 28px 24px 20px;
  border-bottom: 1px solid var(--border);
  position: relative;
}

.sidebar-close-btn {
  display: none;
  position: absolute;
  top: 24px;
  right: 20px;
  background: none;
  border: none;
  font-size: 20px;
  cursor: pointer;
  color: var(--ink-muted);
}

.app-title {
  font-family: 'Noto Serif TC', serif;
  font-size: 20px;
  font-weight: 700;
  color: var(--ink);
  letter-spacing: 0.05em;
}

.app-subtitle {
  font-size: 11px;
  color: var(--ink-muted);
  margin-top: 4px;
  letter-spacing: 0.08em;
}

.api-section {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
}

.api-label {
  font-size: 10px;
  color: var(--ink-muted);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 8px;
}

.api-input-wrap { position: relative; }
.api-input {
  width: 100%;
  padding: 8px 32px 8px 10px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 12px;
  font-family: monospace;
  background: var(--cream);
  color: var(--ink);
  outline: none;
}
.api-input:focus { border-color: var(--accent-light); }
.api-toggle {
  position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
  background: none; border: none; cursor: pointer; color: var(--ink-muted); font-size: 14px;
}
.api-hint { font-size: 10px; color: var(--ink-muted); margin-top: 6px; line-height: 1.5; }
.api-hint a { color: var(--accent); }

.storage-box {
  padding: 12px 20px;
  border-bottom: 1px solid var(--border);
  background: var(--accent-pale);
}
.btn-clear {
  width: 100%;
  padding: 6px;
  background: none;
  border: 1px solid var(--red);
  color: var(--red);
  border-radius: var(--radius-sm);
  font-size: 11px;
  cursor: pointer;
  font-weight: 500;
  transition: all 0.15s;
}
.btn-clear:hover { background: var(--red-pale); }

.monthly-stats {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
}
.stats-title {
  font-size: 10px; color: var(--ink-muted); letter-spacing: 0.1em;
  text-transform: uppercase; margin-bottom: 12px;
}
.stat-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.stat-name { font-size: 12px; color: var(--ink-soft); }
.stat-val { font-size: 14px; font-weight: 500; color: var(--ink); }

.weight-chart-section {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
}
.chart-container {
  width: 100%;
  background: var(--cream);
  border-radius: var(--radius-sm);
  padding: 8px;
  margin-top: 8px;
}

.mood-summary { padding: 16px 20px; }
.mood-bar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.mood-bar-label { font-size: 12px; width: 48px; flex-shrink: 0; }
.mood-bar-track { flex: 1; height: 4px; background: var(--accent-pale); border-radius: 2px; overflow: hidden; }
.mood-bar-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.4s; }
.mood-bar-count { font-size: 11px; color: var(--ink-muted); width: 16px; text-align: right; }

/* ── Calendar ── */
.calendar-header {
  padding: 28px 32px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  background: var(--cream);
  z-index: 10;
}

.menu-toggle-btn {
  display: none;
  background: var(--warm-white);
  border: 1px solid var(--border);
  padding: 8px 12px;
  border-radius: var(--radius-sm);
  font-size: 14px;
  cursor: pointer;
  color: var(--ink-soft);
  align-items: center;
  justify-content: center;
  margin-right: 12px;
}

.month-title {
  font-family: 'Noto Serif TC', serif;
  font-size: 26px;
  font-weight: 500;
  color: var(--ink);
  flex: 1;
}

.nav-btns { display: flex; gap: 8px; }
.nav-btn {
  width: 36px; height: 36px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--warm-white);
  cursor: pointer;
  color: var(--ink-soft);
  font-size: 16px;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
}
.nav-btn:hover { background: var(--accent-pale); border-color: var(--accent-light); color: var(--accent); }

.today-btn {
  padding: 6px 14px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--warm-white);
  cursor: pointer;
  font-size: 12px;
  color: var(--ink-soft);
  font-family: 'Noto Sans TC', sans-serif;
  transition: all 0.15s;
}
.today-btn:hover { background: var(--accent-pale); color: var(--accent); }

.weekday-row {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  padding: 12px 32px 0;
  gap: 4px;
}
.weekday-label {
  text-align: center;
  font-size: 11px;
  color: var(--ink-muted);
  letter-spacing: 0.08em;
  padding-bottom: 8px;
}

.calendar-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 4px;
  padding: 4px 32px 32px;
}

.day-cell {
  aspect-ratio: 1;
  min-height: 95px;
  background: var(--warm-white);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 8px;
  cursor: pointer;
  transition: all 0.15s;
  position: relative;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}
.day-cell:hover { border-color: var(--accent-light); box-shadow: 0 2px 12px var(--shadow); }
.day-cell.empty { background: transparent; border-color: transparent; cursor: default; min-height: 95px; }
.day-cell.today { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-pale); }
.day-cell.has-entry { background: var(--warm-white); }
.day-cell.selected { border-color: var(--accent); background: var(--accent-pale); }

/* 【關鍵修復】確保格子內的小標籤與圖片不會攔截手指點擊，防範手機端點不到日期的問題 */
.day-num, .day-mood, .day-photo, .day-cal-badge, .day-weight-badge {
  pointer-events: none; 
}

.day-num {
  font-size: 13px;
  font-weight: 500;
  color: var(--ink-soft);
  line-height: 1;
  flex-shrink: 0;
}
.day-cell.today .day-num {
  background: var(--accent);
  color: white;
  width: 22px; height: 22px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px;
}

.day-mood { font-size: 14px; margin-top: 4px; }

.day-photo {
  flex: 1;
  margin-top: 4px;
  border-radius: 6px;
  object-fit: cover;
  width: 100%;
  min-height: 0;
}

.day-cal-badge {
  position: absolute;
  bottom: 6px; right: 6px;
  font-size: 9px;
  color: var(--ink-muted);
  background: var(--cream);
  padding: 1px 4px;
  border-radius: 4px;
}

.day-weight-badge {
  position: absolute;
  top: 6px; right: 6px;
  font-size: 10px;
  font-weight: 500;
  color: var(--accent);
  background: var(--accent-pale);
  padding: 1px 4px;
  border-radius: 4px;
}

/* ── Entry Panel ── */
.entry-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(28,26,24,0.4);
  z-index: 100;
  align-items: center;
  justify-content: center;
  padding: 20px;
  pointer-events: none;
}
.entry-overlay.open { display: flex; pointer-events: auto; }

.entry-panel {
  background: var(--warm-white);
  border-radius: 20px;
  width: 100%;
  max-width: 560px;
  max-height: 90vh;
  overflow-y: auto;
  box-shadow: 0 20px 60px rgba(28,26,24,0.2);
  animation: slideUp 0.25s ease;
}
@keyframes slideUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }

.panel-header {
  padding: 20px 24px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky; top: 0;
  background: var(--warm-white);
  border-radius: 20px 20px 0 0;
}
.panel-date { font-family: 'Noto Serif TC', serif; font-size: 18px; font-weight: 500; }
.panel-close {
  width: 32px; height: 32px;
  border: 1px solid var(--border);
  border-radius: 50%;
  background: none;
  cursor: pointer;
  font-size: 16px;
  color: var(--ink-muted);
  display: flex; align-items: center; justify-content: center;
}
.panel-close:hover { background: var(--accent-pale); color: var(--accent); }

.panel-body { padding: 20px 24px; }
.panel-section { margin-bottom: 20px; }
.panel-section-title {
  font-size: 10px;
  color: var(--ink-muted);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-bottom: 10px;
}

.weight-input-wrap {
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--cream);
  padding: 10px 14px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  max-width: 200px;
}
.weight-input {
  width: 100%;
  border: none;
  background: transparent;
  font-size: 16px;
  font-weight: 500;
  color: var(--ink);
  outline: none;
}
.weight-unit { font-size: 13px; color: var(--ink-muted); font-weight: 500; }

/* Meal rows */
.meal-item { margin-bottom: 12px; }
.meal-item-label {
  font-size: 11px;
  color: var(--ink-muted);
  margin-bottom: 6px;
  display: flex; align-items: center; gap: 6px;
}

.upload-zone {
  border: 1.5px dashed var(--accent-light);
  border-radius: var(--radius-sm);
  padding: 14px;
  text-align: center;
  cursor: pointer;
  position: relative;
  transition: background 0.15s;
  background: var(--accent-pale);
}
.upload-zone:hover { background: #E8D8C4; }
.upload-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
.upload-zone p { font-size: 12px; color: var(--accent); }

.text-only-btn {
  width: 100%; margin-top: 6px; padding: 6px;
  background: transparent; color: var(--green);
  border: 1px solid var(--green); border-radius: var(--radius-sm);
  font-size: 11px; cursor: pointer; font-weight: 500;
}
.text-only-btn:hover { background: var(--green-pale); }

.photo-preview { position: relative; }
.preview-img {
  width: 100%; max-height: 160px; object-fit: cover;
  border-radius: var(--radius-sm); display: block;
}
.remove-photo {
  position: absolute; top: 6px; right: 6px;
  background: rgba(28,26,24,0.6); border: none; border-radius: 50%;
  width: 24px; height: 24px; cursor: pointer; color: white; font-size: 13px;
  display: flex; align-items: center; justify-content: center;
}

.analyze-btn {
  width: 100%; margin-top: 8px; padding: 8px;
  background: var(--accent); color: white; border: none;
  border-radius: var(--radius-sm); font-size: 12px; cursor: pointer;
  font-weight: 500; transition: background 0.15s;
}
.analyze-btn:hover { background: #7A5E38; }

.nutrition-box {
  margin-top: 8px; background: var(--green-pale);
  border-radius: var(--radius-sm); padding: 10px 12px;
}
.nutrition-name-input {
  width: 100%; border: 1px solid rgba(92, 122, 92, 0.2);
  background: var(--warm-white); font-size: 14px; font-weight: 500;
  color: var(--green); outline: none; padding: 4px 8px; border-radius: 4px; margin-bottom: 8px;
}
.nutrition-name-input:focus { border-color: var(--green); }

.nutrition-row { display: flex; gap: 6px; }
.nut { flex: 1; text-align: center; }
.nut-v { font-size: 14px; font-weight: 500; color: var(--ink); }
.nut-l { font-size: 9px; color: var(--ink-muted); margin-top: 1px; }
.nut-note { font-size: 10px; color: var(--ink-muted); margin-top: 6px; line-height: 1.5; }

.correction-wrap {
  margin-top: 10px; padding-top: 8px;
  border-top: 1px dashed rgba(92, 122, 92, 0.3); display: flex; gap: 6px;
}
.correction-input {
  flex: 1; padding: 6px 10px; border: 1px solid var(--border);
  border-radius: var(--radius-sm); font-size: 12px; outline: none; background: var(--warm-white);
}
.correction-input:focus { border-color: var(--green); }
.btn-recalc {
  padding: 6px 12px; background: var(--green); color: white; border: none;
  border-radius: var(--radius-sm); font-size: 12px; cursor: pointer; font-weight: 500; white-space: nowrap;
}

.loading-row { display: flex; align-items: center; gap: 8px; padding: 8px 0; }
.dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); animation: pulse 1s infinite; }
.dot:nth-child(2) { animation-delay: 0.2s; }
.dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes pulse { 0%,80%,100%{opacity:0.2} 40%{opacity:1} }
.loading-text { font-size: 12px; color: var(--ink-muted); }

.totals-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 20px; }
.total-box { background: var(--accent-pale); border-radius: var(--radius-sm); padding: 10px; text-align: center; }
.total-v { font-size: 16px; font-weight: 500; color: var(--accent); }
.total-l { font-size: 9px; color: var(--ink-muted); margin-top: 2px; }

.mood-picker { display: flex; gap: 8px; flex-wrap: wrap; }
.mood-opt {
  border: 1px solid var(--border); background: var(--cream); border-radius: 999px;
  padding: 6px 14px; font-size: 13px; cursor: pointer; font-family: 'Noto Sans TC', sans-serif;
}
.mood-opt.active { background: var(--accent); color: white; border-color: var(--accent); }

.note-area {
  width: 100%; min-height: 80px; padding: 10px 12px; border: 1px solid var(--border);
  border-radius: var(--radius-sm); font-size: 13px; color: var(--ink); background: var(--cream); resize: none; outline: none;
}

.panel-footer {
  padding: 16px 24px; border-top: 1px solid var(--border);
  display: flex; justify-content: flex-end; gap: 10px; position: sticky; bottom: 0; background: var(--warm-white); border-radius: 0 0 20px 20px;
}
.btn-save { padding: 9px 24px; background: var(--accent); color: white; border: none; border-radius: var(--radius-sm); font-size: 13px; cursor: pointer; font-weight: 500; }
.btn-cancel { padding: 9px 16px; background: none; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 13px; cursor: pointer; color: var(--ink-soft); }

.toast {
  position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%); background: var(--ink); color: var(--cream);
  padding: 10px 20px; border-radius: 999px; font-size: 13px; opacity: 0; transition: opacity 0.3s; z-index: 999;
}
.toast.show { opacity: 1; }

/* ── 月回顧按鈕 ── */
.review-gen-btn {
  width: 100%; padding: 10px; background: var(--ink); color: var(--cream);
  border: none; border-radius: var(--radius-sm); font-size: 12px;
  font-family: 'Noto Sans TC', sans-serif; cursor: pointer; font-weight: 500;
  letter-spacing: 0.06em; transition: background 0.15s;
  display: flex; align-items: center; justify-content: center; gap: 6px;
}
.review-gen-btn:hover { background: var(--ink-soft); }

/* ── 雜誌 Overlay ── */
.review-overlay {
  display: none; position: fixed; inset: 0;
  background: #0E0C0A; z-index: 200; overflow-y: auto;
  pointer-events: none;
}
.review-overlay.open { display: block; pointer-events: auto; }
.review-close-btn {
  position: fixed; top: 20px; right: 24px; z-index: 201;
  background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
  border-radius: 50%; width: 38px; height: 38px; cursor: pointer;
  color: rgba(255,255,255,0.7); font-size: 16px;
  display: flex; align-items: center; justify-content: center; transition: background 0.15s;
}
.review-close-btn:hover { background: rgba(255,255,255,0.18); }

/* ── 雜誌內容 ── */
.magazine {
  max-width: 860px; margin: 0 auto; padding: 64px 40px 100px;
  font-family: 'Noto Sans TC', sans-serif;
}

/* Loading */
.review-loading { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 80vh; gap: 18px; }
.review-spinner { width: 34px; height: 34px; border: 2px solid rgba(255,255,255,0.08); border-top-color: #D4B896; border-radius: 50%; animation: spin 0.85s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.review-loading-text { font-size: 13px; color: rgba(255,255,255,0.4); letter-spacing: 0.1em; }

/* Cover */
.mag-cover { padding-bottom: 52px; margin-bottom: 52px; border-bottom: 1px solid rgba(255,255,255,0.1); }
.mag-overline { font-size: 10px; letter-spacing: 0.28em; color: rgba(255,255,255,0.35); text-transform: uppercase; margin-bottom: 18px; }
.mag-month-en { font-family: 'Noto Serif TC', serif; font-size: clamp(54px,9vw,96px); font-weight: 700; color: white; line-height: 0.92; letter-spacing: -0.02em; }
.mag-month-zh { font-family: 'Noto Serif TC', serif; font-size: clamp(22px,3.5vw,36px); font-weight: 300; color: rgba(255,255,255,0.5); margin-top: 10px; letter-spacing: 0.08em; }
.mag-tagline { font-family: 'Noto Serif TC', serif; font-style: italic; font-size: 18px; color: rgba(255,255,255,0.55); margin-top: 24px; max-width: 440px; line-height: 1.6; }
.mag-cover-stats { display: flex; gap: 36px; margin-top: 36px; flex-wrap: wrap; }
.cover-stat-v { font-size: 30px; font-weight: 300; color: white; letter-spacing: -0.02em; line-height: 1; }
.cover-stat-l { font-size: 9px; color: rgba(255,255,255,0.35); letter-spacing: 0.12em; text-transform: uppercase; margin-top: 4px; }

/* Sections */
.mag-section { margin-bottom: 52px; }
.mag-section-label { font-size: 9px; letter-spacing: 0.24em; color: rgba(255,255,255,0.3); text-transform: uppercase; margin-bottom: 14px; padding-bottom: 12px; border-bottom: 1px solid rgba(255,255,255,0.08); }
.mag-headline { font-family: 'Noto Serif TC', serif; font-size: clamp(18px,2.8vw,26px); font-weight: 500; color: white; line-height: 1.5; margin-bottom: 16px; }
.mag-body { font-size: 14px; color: rgba(255,255,255,0.58); line-height: 1.9; font-weight: 300; }
.mag-body p { margin-bottom: 12px; }
.mag-pull {
  font-family: 'Noto Serif TC', serif; font-style: italic;
  font-size: clamp(18px,2.4vw,22px); color: rgba(255,255,255,0.78); line-height: 1.55;
  border-left: 3px solid #D4B896; padding-left: 22px; margin: 32px 0;
}

/* Photo Grid */
.mag-photo-grid { display: grid; gap: 10px; margin: 24px 0; }
.mag-photo-grid.g1 { grid-template-columns: 1fr; }
.mag-photo-grid.g2 { grid-template-columns: 1fr 1fr; }
.mag-photo-grid.g3 { grid-template-columns: 1fr 1fr 1fr; }
.mag-photo-grid.g4 { grid-template-columns: 1fr 1fr 1fr 1fr; }
.mag-photo-grid.g5 { grid-template-columns: 2fr 1fr 1fr; grid-template-rows: auto auto; }
.mag-photo-grid.g6plus { grid-template-columns: repeat(4,1fr); }
.mag-photo-item { position: relative; overflow: hidden; border-radius: 8px; background: rgba(255,255,255,0.03); }
.mag-photo-item.feature { grid-column: span 2; grid-row: span 2; }
.mag-photo-img { width: 100%; height: 180px; object-fit: cover; display: block; border-radius: 8px; transition: transform 0.3s; }
.mag-photo-item:hover .mag-photo-img { transform: scale(1.03); }
.mag-photo-caption { position: absolute; bottom: 0; left: 0; right: 0; padding: 22px 12px 10px; background: linear-gradient(transparent, rgba(0,0,0,0.72)); font-size: 10px; color: rgba(255,255,255,0.72); border-radius: 0 0 8px 8px; }

/* Nutrition Spread */
.mag-nut-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 1px; background: rgba(255,255,255,0.07); border-radius: 10px; overflow: hidden; margin: 20px 0; }
.mag-nut-cell { background: rgba(255,255,255,0.03); padding: 22px 16px; text-align: center; }
.mag-nut-v { font-family: 'Noto Serif TC', serif; font-size: 34px; font-weight: 300; color: white; letter-spacing: -0.02em; }
.mag-nut-unit { font-size: 11px; color: rgba(255,255,255,0.35); }
.mag-nut-l { font-size: 9px; color: rgba(255,255,255,0.35); letter-spacing: 0.1em; text-transform: uppercase; margin-top: 6px; }

/* Mood Timeline */
.mag-mood-row { display: flex; flex-wrap: wrap; gap: 2px; margin: 18px 0; }
.mood-pip { display: flex; flex-direction: column; align-items: center; flex: 1; min-width: 26px; padding: 6px 2px; }
.mood-pip-emoji { font-size: 15px; }
.mood-pip-day { font-size: 8px; color: rgba(255,255,255,0.28); margin-top: 3px; }

/* Top Foods */
.mag-food-item { display: flex; align-items: center; gap: 16px; padding: 13px 0; border-bottom: 1px solid rgba(255,255,255,0.06); }
.mag-food-rank { font-family: 'Noto Serif TC', serif; font-size: 24px; color: rgba(255,255,255,0.12); font-weight: 700; width: 30px; flex-shrink: 0; }
.mag-food-img { width: 54px; height: 54px; border-radius: 7px; object-fit: cover; flex-shrink: 0; background: rgba(255,255,255,0.05); }
.mag-food-name { font-size: 14px; color: white; font-weight: 500; margin-bottom: 3px; }
.mag-food-meta { font-size: 11px; color: rgba(255,255,255,0.38); }
.mag-food-cal { font-size: 20px; font-weight: 300; color: rgba(255,255,255,0.55); margin-left: auto; white-space: nowrap; }
.mag-food-cal span { font-size: 10px; color: rgba(255,255,255,0.25); }

/* Divider */
.mag-divider { border: none; border-top: 1px solid rgba(255,255,255,0.08); margin: 48px 0; }

@media (max-width: 600px) {
  .magazine { padding: 48px 20px 80px; }
  .mag-photo-grid.g3, .mag-photo-grid.g4, .mag-photo-grid.g5, .mag-photo-grid.g6plus { grid-template-columns: 1fr 1fr; }
  .mag-nut-grid { grid-template-columns: repeat(2,1fr); }
  .mag-cover-stats { gap: 24px; }
  .review-close-btn { top: 12px; right: 14px; }
}

/* ── 響應式手機版滑出側欄 ── */
@media (max-width: 768px) {
  .menu-toggle-btn { display: flex; }
  .sidebar-close-btn { display: block; }
  .sidebar {
    position: fixed; top: 0; left: 0; bottom: 0; width: 280px;
    transform: translateX(-100%); box-shadow: 4px 0 24px rgba(28,26,24,0.15);
  }
  .sidebar.open { transform: translateX(0); }
  .sidebar-overlay.open { display: block; }
  .calendar-grid { padding: 4px 12px 24px; }
  .weekday-row { padding: 12px 12px 0; }
  .calendar-header { padding: 20px 12px 16px; }
  .day-cell { min-height: 85px; }
  .day-cell.empty { min-height: 85px; }
}
</style>
</head>
<body>

<div class="app">
  <div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar(false)"></div>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="app-title">我的生活日記</div>
      <div class="app-subtitle">MY LIFE JOURNAL</div>
      <button class="sidebar-close-btn" onclick="toggleSidebar(false)">✕</button>
    </div>

    <div class="api-section">
      <div class="api-label">Google Gemini API Key</div>
      <div class="api-input-wrap">
        <input type="password" class="api-input" id="api-key" placeholder="AIzaSy..." oninput="saveApiKey()" />
        <button class="api-toggle" id="api-toggle" onclick="toggleApiKey()">👁</button>
      </div>
      <div class="api-hint">用於 AI 分析食物營養。<br>免費取得：<a href="https://aistudio.google.com" target="_blank">aistudio.google.com</a></div>
    </div>

    <div class="storage-box">
      <button class="btn-clear" onclick="clearAllData()">⚠️ 清除過期爆滿快取 (重設空間)</button>
    </div>

    <div class="monthly-stats">
      <div class="stats-title">本月統計</div>
      <div class="stat-row"><span class="stat-name">記錄天數</span><span class="stat-val" id="stat-days">0 天</span></div>
      <div class="stat-row"><span class="stat-name">平均卡路里</span><span class="stat-val" id="stat-cal">— kcal</span></div>
      <div class="stat-row"><span class="stat-name">平均蛋白質</span><span class="stat-val" id="stat-prot">— g</span></div>
    </div>

    <div class="weight-chart-section">
      <div class="stats-title">本月體重趨勢</div>
      <div class="chart-container"><canvas id="weightChart"></canvas></div>
    </div>

    <div class="mood-summary">
      <div class="stats-title">本月心情</div>
      <div id="mood-bars"></div>
    </div>

    <div style="padding: 16px 20px; border-top: 1px solid var(--border);">
      <div class="stats-title">月回顧</div>
      <button class="review-gen-btn" id="review-btn" onclick="openReview()">✦ 生成雜誌月回顧</button>
    </div>
  </aside>

  <main class="main">
    <div class="calendar-header">
      <button class="menu-toggle-btn" onclick="toggleSidebar(true)">☰選單</button>
      <div class="month-title" id="month-title"></div>
      <div style="display:flex;gap:8px;align-items:center">
        <button class="today-btn" onclick="goToday()">今天</button>
        <div class="nav-btns">
          <button class="nav-btn" onclick="prevMonth()">‹</button>
          <button class="nav-btn" onclick="nextMonth()">›</button>
        </div>
      </div>
    </div>

    <div class="weekday-row">
      <div class="weekday-label">日</div><div class="weekday-label">一</div><div class="weekday-label">二</div>
      <div class="weekday-label">三</div><div class="weekday-label">四</div><div class="weekday-label">五</div><div class="weekday-label">六</div>
    </div>
    <div class="calendar-grid" id="calendar-grid"></div>
  </main>
</div>

<div class="entry-overlay" id="entry-overlay">
  <div class="entry-panel" id="entry-panel">
    <div class="panel-header">
      <div class="panel-date" id="panel-date"></div>
      <button class="panel-close" onclick="closePanel()">✕</button>
    </div>
    <div class="panel-body">
      <div class="totals-row">
        <div class="total-box"><div class="total-v" id="t-cal">0</div><div class="total-l">卡路里 kcal</div></div>
        <div class="total-box"><div class="total-v" id="t-prot">0g</div><div class="total-l">蛋白質</div></div>
        <div class="total-box"><div class="total-v" id="t-carb">0g</div><div class="total-l">碳水</div></div>
        <div class="total-box"><div class="total-v" id="t-fat">0g</div><div class="total-l">脂肪</div></div>
      </div>

      <div class="panel-section">
        <div class="panel-section-title">今日體重</div>
        <div class="weight-input-wrap">
          <input type="number" step="0.1" class="weight-input" id="weight-input" placeholder="──.─">
          <span class="weight-unit">kg</span>
        </div>
      </div>

      <div class="panel-section">
        <div class="panel-section-title">今天吃了什麼</div>
        <div id="meals-area"></div>
      </div>

      <div class="panel-section">
        <div class="panel-section-title">今天的心情</div>
        <div class="mood-picker" id="mood-picker">
          <button class="mood-opt" data-mood="😊 開心">😊 開心</button>
          <button class="mood-opt" data-mood="😌 平靜">😌 平靜</button>
          <button class="mood-opt" data-mood="😴 疲憊">😴 疲憊</button>
          <button class="mood-opt" data-mood="😟 焦慮">😟 焦慮</button>
          <button class="mood-opt" data-mood="😢 難過">😢 難過</button>
          <button class="mood-opt" data-mood="🌟 充實">🌟 充實</button>
        </div>
      </div>

      <div class="panel-section">
        <div class="panel-section-title">今天的小記</div>
        <textarea class="note-area" id="note-area" placeholder="今天發生了什麼…"></textarea>
      </div>
    </div>
    <div class="panel-footer">
      <button class="btn-cancel" onclick="closePanel()">取消</button>
      <button class="btn-save" onclick="saveEntry()">儲存 ✓</button>
    </div>
  </div>
</div>

<!-- ── 雜誌月回顧 Overlay ── -->
<div class="review-overlay" id="review-overlay">
  <button class="review-close-btn" onclick="closeReview()">✕</button>
  <div class="magazine" id="magazine-content">
    <div class="review-loading" id="review-loading">
      <div class="review-spinner"></div>
      <div class="review-loading-text">AI 正在撰寫你的雜誌月回顧…</div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const STORE_KEY = 'life_journal_v1';
const API_STORE_KEY = 'life_journal_gemini_key';
const MEALS_DEF = [
  { id: 'breakfast', label: '早餐', emoji: '🌅' },
  { id: 'lunch',     label: '午餐', emoji: '☀️' },
  { id: 'dinner',    label: '晚餐', emoji: '🌙' },
  { id: 'snack',     label: '點心', emoji: '🍪' },
];

let viewYear, viewMonth, selectedDate, panelMealData = {}, panelMood = '', panelNote = '';
let myWeightChart = null;

function today() { const d = new Date(); return { y: d.getFullYear(), m: d.getMonth(), d: d.getDate() }; }
function pad(n) { return String(n).padStart(2, '0'); }
function dateKey(y, m, d) { return `${y}-${pad(m+1)}-${pad(d)}`; }

function loadStore() { try { return JSON.parse(localStorage.getItem(STORE_KEY) || '{}'); } catch { return {}; } }
function saveStore(data) { localStorage.setItem(STORE_KEY, JSON.stringify(data)); }

function saveApiKey() { localStorage.setItem(API_STORE_KEY, document.getElementById('api-key').value.trim()); }
function loadApiKey() { const k = localStorage.getItem(API_STORE_KEY); if (k) document.getElementById('api-key').value = k; }
function getApiKey() { return document.getElementById('api-key').value.trim(); }

function clearAllData() {
  if (confirm('確定要清空日記快取嗎？這會釋放舊相片空間！')) {
    localStorage.removeItem(STORE_KEY); showToast('空間重置成功！'); renderCalendar();
  }
}

function showToast(msg) {
  const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function toggleSidebar(open) {
  const s = document.getElementById('sidebar'); const o = document.getElementById('sidebar-overlay');
  if (open) { s.classList.add('open'); o.classList.add('open'); } 
  else { s.classList.remove('open'); o.classList.remove('open'); }
}

function toggleApiKey() { const inp = document.getElementById('api-key'); inp.type = inp.type === 'password' ? 'text' : 'password'; }

// ── Calendar ──
function renderCalendar() {
  const store = loadStore();
  const months = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  document.getElementById('month-title').textContent = `${viewYear} 年 ${months[viewMonth]}`;

  const firstDay = new Date(viewYear, viewMonth, 1).getDay();
  const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();
  const { y: ty, m: tm, d: td } = today();
  const grid = document.getElementById('calendar-grid');
  grid.innerHTML = '';

  for (let i = 0; i < firstDay; i++) {
    const el = document.createElement('div'); el.className = 'day-cell empty'; grid.appendChild(el);
  }

  for (let d = 1; d <= daysInMonth; d++) {
    const key = dateKey(viewYear, viewMonth, d); const entry = store[key];
    const isToday = viewYear === ty && viewMonth === tm && d === td;

    const cell = document.createElement('div');
    cell.className = 'day-cell' + (isToday ? ' today' : '') + (entry ? ' has-entry' : '');
    cell.setAttribute('data-y', y);
    cell.setAttribute('data-mo', viewMonth);
    cell.setAttribute('data-d', d);
    cell.addEventListener('click', function() {
      openPanel(
        parseInt(this.getAttribute('data-y')),
        parseInt(this.getAttribute('data-mo')),
        parseInt(this.getAttribute('data-d'))
      );
    });

    const numEl = document.createElement('div'); numEl.className = 'day-num'; numEl.textContent = d;
    cell.appendChild(numEl);

    if (entry) {
      if (entry.weight) {
        const w = document.createElement('div'); w.className = 'day-weight-badge'; w.textContent = entry.weight + 'k'; cell.appendChild(w);
      }
      if (entry.mood) {
        const m = document.createElement('div'); m.className = 'day-mood'; m.textContent = entry.mood.split(' ')[0]; cell.appendChild(m);
      }
      const firstPhoto = MEALS_DEF.map(m => entry.meals?.[m.id]?.imageData).find(Boolean);
      if (firstPhoto) {
        const img = document.createElement('img'); img.className = 'day-photo'; img.src = firstPhoto; cell.appendChild(img);
      }
      const totalCal = MEALS_DEF.reduce((s, m) => s + (entry.meals?.[m.id]?.nutrition?.calories || 0), 0);
      if (totalCal > 0) {
        const b = document.createElement('div'); b.className = 'day-cal-badge'; b.textContent = Math.round(totalCal) + ' kcal'; cell.appendChild(b);
      }
    }
    grid.appendChild(cell);
  }
  updateSidebar();
}

function updateSidebar() {
  const store = loadStore(); let days = 0, totalCal = 0, totalProt = 0; const moodCount = {};
  const labels = []; const weights = [];
  const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();

  for (let d = 1; d <= daysInMonth; d++) {
    const key = dateKey(viewYear, viewMonth, d); const entry = store[key];
    labels.push(`${d}日`);
    weights.push((entry && entry.weight) ? Number(entry.weight) : null);

    if (!entry) continue;
    days++;
    totalCal += MEALS_DEF.reduce((s, m) => s + (entry.meals?.[m.id]?.nutrition?.calories || 0), 0);
    totalProt += MEALS_DEF.reduce((s, m) => s + (entry.meals?.[m.id]?.nutrition?.protein || 0), 0);
    if (entry.mood) moodCount[entry.mood] = (moodCount[entry.mood] || 0) + 1;
  }

  document.getElementById('stat-days').textContent = days + ' 天';
  document.getElementById('stat-cal').textContent = days ? Math.round(totalCal / days) + ' kcal' : '— kcal';
  document.getElementById('stat-prot').textContent = days ? Math.round(totalProt / days) + ' g' : '— g';

  const maxMood = Math.max(1, ...Object.values(moodCount));
  const moodOrder = ['😊 開心','😌 平靜','😴 疲憊','😟 焦慮','😢 難過','🌟 充實'];
  document.getElementById('mood-bars').innerHTML = moodOrder.map(m => {
    const c = moodCount[m] || 0; const pct = Math.round((c / maxMood) * 100);
    return `<div class="mood-bar-row">
      <div class="mood-bar-label">${m.split(' ')[0]}</div>
      <div class="mood-bar-track"><div class="mood-bar-fill" style="width:${pct}%"></div></div>
      <div class="mood-bar-count">${c}</div>
    </div>`;
  }).join('');

  renderWeightChart(labels, weights);
}

function renderWeightChart(labels, data) {
  const canvas = document.getElementById('weightChart'); if (!canvas) return;
  if (myWeightChart) { myWeightChart.data.labels = labels; myWeightChart.data.datasets[0].data = data; myWeightChart.update(); return; }
  myWeightChart = new Chart(canvas.getContext('2d'), {
    type: 'line',
    data: {
      labels: labels,
      datasets: [{ label: '體重', data: data, borderColor: '#8B6F47', backgroundColor: 'rgba(139,111,71,0.05)', borderWidth: 2, spanGaps: true }]
    },
    options: {
      responsive: true, maintainAspectRatio: true,
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { font: { size: 9 }, autoSkip: true, maxTicksLimit: 6 } },
        y: { ticks: { font: { size: 9 } } }
      }
    }
  });
}

function prevMonth() { viewMonth--; if (viewMonth < 0) { viewMonth = 11; viewYear--; } renderCalendar(); }
function nextMonth() { viewMonth++; if (viewMonth > 11) { viewMonth = 0; viewYear++; } renderCalendar(); }
function goToday() { const { y, m } = today(); viewYear = y; viewMonth = m; renderCalendar(); }

// ── Panel 開啟核心（全面加強舊資料的容錯率） ──
function openPanel(y, mo, d) {
  try {
    selectedDate = { y, mo, d }; 
    const store = loadStore(); 
    const key = dateKey(y, mo, d); 
    const entry = store[key] || {};
    
    panelMealData = {};
    MEALS_DEF.forEach(m => {
      // 安全鏈：防止舊格式 entry.meals 沒有這個 id 或結構不對而引發崩潰
      if (entry.meals && entry.meals[m.id]) {
        panelMealData[m.id] = { 
          imageData: entry.meals[m.id].imageData || null,
          isTextOnly: !!entry.meals[m.id].isTextOnly,
          nutrition: entry.meals[m.id].nutrition || { name: '', calories: 0, protein: 0, carbs: 0, fat: 0, note: '' },
          correctionText: entry.meals[m.id].correctionText || ''
        };
      } else {
        panelMealData[m.id] = null;
      }
    });

    panelMood = entry.mood || ''; 
    panelNote = entry.note || '';
    
    const months = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
    document.getElementById('panel-date').textContent = `${y} 年 ${months[mo]} ${d} 日`;
    document.getElementById('note-area').value = panelNote;
    document.getElementById('weight-input').value = entry.weight || '';

    document.querySelectorAll('.mood-opt').forEach(b => b.classList.toggle('active', b.dataset.mood === panelMood));
    
    renderMealsArea(); 
    updateTotals();
    document.getElementById('entry-overlay').classList.add('open');
  } catch (err) {
    console.error("開啟面板出錯，正在重置當天格式:", err);
    // 終極防禦：若資料損毀，直接給予乾淨的空白面板，確保永遠打得開
    panelMealData = { breakfast: null, lunch: null, dinner: null, snack: null };
    panelMood = ''; panelNote = '';
    renderMealsArea(); updateTotals();
    document.getElementById('entry-overlay').classList.add('open');
  }
}

function closePanel() { document.getElementById('entry-overlay').classList.remove('open'); selectedDate = null; }

document.getElementById('mood-picker').addEventListener('click', e => {
  const btn = e.target.closest('.mood-opt'); if (!btn) return;
  panelMood = btn.dataset.mood === panelMood ? '' : btn.dataset.mood;
  document.querySelectorAll('.mood-opt').forEach(b => b.classList.toggle('active', b.dataset.mood === panelMood));
});

function renderMealsArea() {
  const area = document.getElementById('meals-area');
  area.innerHTML = MEALS_DEF.map(meal => {
    const data = panelMealData[meal.id]; let content = '';
    if (data && (data.imageData || data.isTextOnly)) {
      if (data.imageData) {
        content += `<div class="photo-preview"><img class="preview-img" src="${data.imageData}"><button class="remove-photo" onclick="removePhoto('${meal.id}')">✕</button></div>`;
      } else {
        content += `<div style="font-size:11px; color:var(--green); font-weight:500; margin-bottom:4px;">✍️ 純文字紀錄模式 (<span style="cursor:pointer; text-decoration:underline;" onclick="removePhoto('${meal.id}')">取消變更</span>)</div>`;
      }

      if (data.analyzing) {
        content += `<div class="loading-row"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="loading-text">AI 分析中…</div></div>`;
      } else {
        const n = data.nutrition || { name: '', calories: 0, protein: 0, carbs: 0, fat: 0, note: '' };
        const corr = data.correctionText || '';
        
        // 使用 onchange：打字時不重繪，失焦或打完字才存入變數，兼顧流暢度與即時性
        content += `<div class="nutrition-box">
          <input type="text" class="nutrition-name-input" value="${n.name || ''}" placeholder="請輸入食物名稱（如：牛肉麵）" onchange="panelMealData['${meal.id}'].nutrition.name=this.value;">
          <div class="nutrition-row">
            <div class="nut"><div class="nut-v">${Math.round(n.calories||0)}</div><div class="nut-l">kcal</div></div>
            <div class="nut"><div class="nut-v">${Math.round(n.protein||0)}g</div><div class="nut-l">蛋白質</div></div>
            <div class="nut"><div class="nut-v">${Math.round(n.carbs||0)}g</div><div class="nut-l">碳水</div></div>
            <div class="nut"><div class="nut-v">${Math.round(n.fat||0)}g</div><div class="nut-l">脂肪</div></div>
          </div>
          <div class="correction-wrap">
            <input type="text" class="correction-input" id="hint-${meal.id}" value="${corr}" placeholder="補充細節（如：去皮、半糖、加木耳山藥...）" onchange="panelMealData['${meal.id}'].correctionText=this.value">
            <button class="btn-recalc" onclick="analyzeMeal('${meal.id}')">🔄 讓 AI 估算</button>
          </div>
        </div>`;
      }
    } else {
      content += `<div class="upload-zone"><input type="file" accept="image/*" onchange="handleUpload(event,'${meal.id}')"><p>📷 點擊上傳 ${meal.label} 照片</p></div>
      <button class="text-only-btn" onclick="createTextOnlyMeal('${meal.id}')">✍️ 忘記拍照？直接文字紀錄食物</button>`;
    }
    return `<div class="meal-item"><div class="meal-item-label">${meal.emoji} ${meal.label}</div>${content}</div>`;
  }).join('');
}

function handleUpload(e, mealId) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas'); const ctx = canvas.getContext('2d');
      const MAX_WIDTH = 500; let width = img.width; let height = img.height;
      if (width > MAX_WIDTH) { height = Math.round((height * MAX_WIDTH) / width); width = MAX_WIDTH; }
      canvas.width = width; canvas.height = height; ctx.drawImage(img, 0, 0, width, height);
      panelMealData[mealId] = { imageData: canvas.toDataURL('image/jpeg', 0.5), isTextOnly: false, analyzing: false, nutrition: { name: '', calories: 0, protein: 0, carbs: 0, fat: 0, note: '' }, correctionText: '' };
      renderMealsArea();
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}

function createTextOnlyMeal(mealId) {
  panelMealData[mealId] = { imageData: null, isTextOnly: true, analyzing: false, nutrition: { name: '', calories: 0, protein: 0, carbs: 0, fat: 0, note: '' }, correctionText: '' };
  renderMealsArea();
}

function removePhoto(mealId) { panelMealData[mealId] = null; renderMealsArea(); updateTotals(); }

async function analyzeMeal(mealId) {
  const target = panelMealData[mealId]; if (!target) return;
  const key = getApiKey(); if (!key) { showToast('請先輸入 API Key'); return; }

  const foodName = target.nutrition?.name ? target.nutrition.name.trim() : '';
  const specificHint = target.correctionText ? target.correctionText.trim() : '';

  if (target.isTextOnly && !foodName) { showToast('請先輸入食物名稱喔！'); return; }

  target.analyzing = true; renderMealsArea();
  let partsArray = []; let systemPrompt = '';

  if (target.isTextOnly) {
    systemPrompt = `請精確估算以下文字描述食物的熱量與營養成分。\n食物名稱："${foodName}"`;
    if (specificHint) systemPrompt += `\n細節描述："${specificHint}"`;
    partsArray.push({ text: systemPrompt });
  } else {
    systemPrompt = '請精確分析這張食物照片中的營養成分。';
    if (foodName) systemPrompt += `\n已知食物名稱："${foodName}"`;
    if (specificHint) systemPrompt += `\n【更正資訊】："${specificHint}"`;
    partsArray.push({ text: systemPrompt });
    const base64 = target.imageData.split(',')[1];
    const mediaType = target.imageData.split(';')[0].split(':')[1] || 'image/jpeg';
    partsArray.push({ inlineData: { mimeType: mediaType, data: base64 } });
  }

  try {
    const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${key}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        contents: [{ parts: partsArray }],
        generationConfig: {
          responseMimeType: 'application/json',
          responseSchema: {
            type: 'OBJECT',
            properties: {
              name: { type: 'STRING' }, calories: { type: 'INTEGER' }, protein: { type: 'INTEGER' }, carbs: { type: 'INTEGER' }, fat: { type: 'INTEGER' }, note: { type: 'STRING' }
            },
            required: ['name', 'calories', 'protein', 'carbs', 'fat', 'note']
          }
        }
      })
    });
    if (!resp.ok) throw new Error('API 回傳錯誤');
    const json = await resp.json();
    const textResult = json.candidates?.[0]?.content?.parts?.[0]?.text;
    if (!textResult) throw new Error('AI 未能返回內容');
    target.nutrition = JSON.parse(textResult.trim());
    if (!target.nutrition.name && foodName) target.nutrition.name = foodName;
    target.analyzing = false; showToast('估算完成！');
  } catch(err) {
    console.error(err); target.analyzing = false;
    target.nutrition = { name: foodName || '分析失敗', calories: 0, protein: 0, carbs: 0, fat: 0, note: '請重試' };
    showToast('分析失敗');
  }
  renderMealsArea(); updateTotals();
}

function saveEntry() {
  if (!selectedDate) return; const store = loadStore(); const key = dateKey(selectedDate.y, selectedDate.mo, selectedDate.d);
  const saveMeals = {};
  MEALS_DEF.forEach(m => { if (panelMealData[m.id]) saveMeals[m.id] = { ...panelMealData[m.id] }; });
  const w = document.getElementById('weight-input').value.trim();
  store[key] = { meals: saveMeals, mood: panelMood, note: document.getElementById('note-area').value, weight: w ? Number(w) : null };
  try { saveStore(store); closePanel(); renderCalendar(); showToast('已儲存！✓'); } 
  catch(e) { alert('儲存失敗，空間已滿，請清除部分舊照片。'); }
}

// ── 雜誌月回顧 ──
const MONTHS_EN = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const MONTHS_ZH = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];

function closeReview() { document.getElementById('review-overlay').classList.remove('open'); }

async function openReview() {
  const key = getApiKey();
  if (!key) { showToast('請先輸入 Gemini API Key'); return; }

  // 收集本月資料
  const store = loadStore();
  const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();
  const entries = [];
  for (let d = 1; d <= daysInMonth; d++) {
    const entry = store[dateKey(viewYear, viewMonth, d)];
    if (entry) entries.push({ day: d, ...entry });
  }
  if (entries.length === 0) { showToast('這個月還沒有任何記錄！'); return; }

  // 開啟 overlay，顯示 loading
  document.getElementById('review-overlay').classList.add('open');
  document.getElementById('magazine-content').innerHTML = `
    <div class="review-loading">
      <div class="review-spinner"></div>
      <div class="review-loading-text">AI 正在撰寫你的雜誌月回顧…</div>
    </div>`;

  // 統計數字
  let totalCal = 0, totalProt = 0, totalCarb = 0, totalFat = 0, mealCount = 0;
  const moodCount = {}, allPhotos = [], topFoodsMap = [];
  const moodTimeline = [];

  entries.forEach(e => {
    const meals = e.meals || {};
    MEALS_DEF.forEach(m => {
      const meal = meals[m.id];
      if (!meal) return;
      if (meal.nutrition && meal.nutrition.calories) {
        totalCal += meal.nutrition.calories || 0;
        totalProt += meal.nutrition.protein || 0;
        totalCarb += meal.nutrition.carbs || 0;
        totalFat += meal.nutrition.fat || 0;
        mealCount++;
        topFoodsMap.push({ name: meal.nutrition.name, cal: meal.nutrition.calories || 0, mealType: m.label, day: e.day, imageData: meal.imageData || null });
      }
      if (meal.imageData) allPhotos.push({ src: meal.imageData, caption: meal.nutrition?.name || m.label, day: e.day, mealType: m.label });
    });
    if (e.mood) moodCount[e.mood] = (moodCount[e.mood] || 0) + 1;
    moodTimeline.push({ day: e.day, mood: e.mood || '' });
  });

  const avgCal = entries.length > 0 ? Math.round(totalCal / entries.length) : 0;
  const topFoods = [...topFoodsMap].sort((a, b) => b.cal - a.cal).slice(0, 5);
  const dominantMood = Object.entries(moodCount).sort((a, b) => b[1] - a[1])[0]?.[0] || '';
  const notes = entries.filter(e => e.note).map(e => `${e.day}日：${e.note}`).join('\n').slice(0, 500);

  // 呼叫 Gemini 生成回顧文字
  let narrative = null;
  const prompt = `你是一位有溫度的生活雜誌編輯（風格類似 Kinfolk）。請根據以下這個月的生活資料，用繁體中文寫一篇雜誌風格的月回顧。

資料：
月份：${viewYear}年${MONTHS_ZH[viewMonth]}
記錄天數：${entries.length}天
平均每日卡路里：${avgCal} kcal
總蛋白質：${Math.round(totalProt)}g，總碳水：${Math.round(totalCarb)}g，總脂肪：${Math.round(totalFat)}g
主要心情：${dominantMood}
心情分布：${Object.entries(moodCount).map(([k,v]) => k+' '+v+'次').join('、')}
高卡路里食物Top3：${topFoods.slice(0,3).map(f => f.name+'('+f.cal+'kcal)').join('、') || '無'}
日記節錄：${notes || '無'}

請只回傳 JSON（不要 markdown），格式：
{"theme":"這個月的主題（5字以內）","intro":"溫暖的開場白（2-3句，有畫面感）","food_insight":"飲食觀察（約80字，有溫度）","mood_insight":"心情洞察（約60字，細膩）","quote":"代表這個月的金句（25字以內，詩意）"}`;

  try {
    const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${key}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        contents: [{ parts: [{ text: prompt }] }],
        generationConfig: { responseMimeType: 'application/json' }
      })
    });
    const json = await resp.json();
    const raw = json.candidates?.[0]?.content?.parts?.[0]?.text || '';
    narrative = JSON.parse(raw.replace(/```json|```/g, '').trim());
  } catch (e) {
    narrative = { theme: '生活的滋味', intro: '這是屬於你的一個月，每一天都值得被記住。', food_insight: '每一餐都是生活的印記，滋養著你前行的力量。', mood_insight: '情緒的起伏是生命最真實的節奏。', quote: '好好吃飯，認真生活。' };
  }

  // 建立照片格子
  const photoCount = allPhotos.length;
  let gridClass = 'g1', photoHTML = '';
  if (photoCount === 2) gridClass = 'g2';
  else if (photoCount === 3) gridClass = 'g3';
  else if (photoCount === 4) gridClass = 'g4';
  else if (photoCount === 5) gridClass = 'g5';
  else if (photoCount >= 6) gridClass = 'g6plus';

  const displayPhotos = allPhotos.slice(0, 8);
  displayPhotos.forEach((p, i) => {
    const isFeature = photoCount === 5 && i === 0;
    photoHTML += `<div class="mag-photo-item${isFeature ? ' feature' : ''}">
      <img class="mag-photo-img" src="${p.src}" alt="${p.caption}" loading="lazy">
      <div class="mag-photo-caption">${p.caption} · ${p.day}日 ${p.mealType}</div>
    </div>`;
  });

  // 心情時間軸
  const moodTimelineHTML = moodTimeline.map(t => `
    <div class="mood-pip">
      <div class="mood-pip-emoji">${t.mood ? t.mood.split(' ')[0] : '·'}</div>
      <div class="mood-pip-day">${t.day}</div>
    </div>`).join('');

  // 最高卡路里食物清單
  const topFoodHTML = topFoods.map((f, i) => `
    <div class="mag-food-item">
      <div class="mag-food-rank">${String(i+1).padStart(2,'0')}</div>
      ${f.imageData ? `<img class="mag-food-img" src="${f.imageData}" alt="${f.name}">` : '<div class="mag-food-img"></div>'}
      <div>
        <div class="mag-food-name">${f.name || '未命名'}</div>
        <div class="mag-food-meta">${f.mealType} · 第 ${f.day} 日</div>
      </div>
      <div class="mag-food-cal">${Math.round(f.cal)}<span> kcal</span></div>
    </div>`).join('');

  // 渲染雜誌
  document.getElementById('magazine-content').innerHTML = `
    <div class="mag-cover">
      <div class="mag-overline">MY LIFE JOURNAL · ${viewYear}</div>
      <div class="mag-month-en">${MONTHS_EN[viewMonth]}</div>
      <div class="mag-month-zh">${MONTHS_ZH[viewMonth]}　${narrative.theme}</div>
      <div class="mag-tagline">${narrative.intro}</div>
      <div class="mag-cover-stats">
        <div><div class="cover-stat-v">${entries.length}</div><div class="cover-stat-l">Days Recorded</div></div>
        <div><div class="cover-stat-v">${avgCal}</div><div class="cover-stat-l">Avg. Calories</div></div>
        <div><div class="cover-stat-v">${mealCount}</div><div class="cover-stat-l">Meals Logged</div></div>
        ${Object.keys(moodCount).length ? `<div><div class="cover-stat-v">${dominantMood.split(' ')[0]}</div><div class="cover-stat-l">Top Mood</div></div>` : ''}
      </div>
    </div>

    ${photoHTML ? `
    <div class="mag-section">
      <div class="mag-section-label">This Month's Table</div>
      <div class="mag-photo-grid ${gridClass}">${photoHTML}</div>
    </div>` : ''}

    <div class="mag-section">
      <div class="mag-section-label">Nutrition Spread</div>
      <div class="mag-nut-grid">
        <div class="mag-nut-cell"><div class="mag-nut-v">${avgCal}</div><div class="mag-nut-unit"> kcal</div><div class="mag-nut-l">Daily Avg</div></div>
        <div class="mag-nut-cell"><div class="mag-nut-v">${Math.round(totalProt)}</div><div class="mag-nut-unit">g</div><div class="mag-nut-l">Protein</div></div>
        <div class="mag-nut-cell"><div class="mag-nut-v">${Math.round(totalCarb)}</div><div class="mag-nut-unit">g</div><div class="mag-nut-l">Carbs</div></div>
        <div class="mag-nut-cell"><div class="mag-nut-v">${Math.round(totalFat)}</div><div class="mag-nut-unit">g</div><div class="mag-nut-l">Fat</div></div>
      </div>
      <div class="mag-body"><p>${narrative.food_insight}</p></div>
      <div class="mag-pull">${narrative.quote}</div>
    </div>

    ${topFoods.length ? `
    <div class="mag-section">
      <div class="mag-section-label">Most Indulgent This Month</div>
      <div>${topFoodHTML}</div>
    </div>` : ''}

    <div class="mag-section">
      <div class="mag-section-label">Mood Timeline</div>
      <div class="mag-mood-row">${moodTimelineHTML}</div>
      <div class="mag-body"><p>${narrative.mood_insight}</p></div>
    </div>
  `;
}

// ── Init ──
const { y, m } = today(); viewYear = y; viewMonth = m; loadApiKey(); renderCalendar();
</script>
