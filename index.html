<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的生活日記</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;700&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
:root {
  --cream: #FAF7F2;
  --warm-white: #FFFDF9;
  --ink: #1C1A18;
  --ink-soft: #4A4540;
  --ink-muted: #8C877F;
  --ink-faint: #C4BFB8;
  --accent: #8B6F47;
  --accent-light: #D4B896;
  --accent-pale: #F0E8DC;
  --green: #5C7A5C;
  --green-pale: #E8F0E8;
  --red-pale: #F5E8E8;
  --red: #8B4040;
  --border: rgba(139,111,71,0.15);
  --shadow: rgba(28,26,24,0.06);
  --radius: 12px;
  --radius-sm: 8px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Noto Sans TC', sans-serif;
  background: var(--cream);
  color: var(--ink);
  min-height: 100vh;
  font-weight: 300;
}

/* ── Layout ── */
.app { display: flex; height: 100vh; overflow: hidden; }

.sidebar {
  width: 280px;
  flex-shrink: 0;
  background: var(--warm-white);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow-y: auto;
}

.main {
  flex: 1;
  overflow-y: auto;
  background: var(--cream);
}

/* ── Sidebar ── */
.sidebar-header {
  padding: 28px 24px 20px;
  border-bottom: 1px solid var(--border);
}

.app-title {
  font-family: 'Noto Serif TC', serif;
  font-size: 20px;
  font-weight: 700;
  color: var(--ink);
  letter-spacing: 0.05em;
}

.app-subtitle {
  font-size: 11px;
  color: var(--ink-muted);
  margin-top: 4px;
  letter-spacing: 0.08em;
}

.api-section {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
}

.api-label {
  font-size: 10px;
  color: var(--ink-muted);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 8px;
}

.api-input-wrap { position: relative; }
.api-input {
  width: 100%;
  padding: 8px 32px 8px 10px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 12px;
  font-family: monospace;
  background: var(--cream);
  color: var(--ink);
  outline: none;
}
.api-input:focus { border-color: var(--accent-light); }
.api-toggle {
  position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
  background: none; border: none; cursor: pointer; color: var(--ink-muted); font-size: 14px;
}
.api-hint { font-size: 10px; color: var(--ink-muted); margin-top: 6px; line-height: 1.5; }
.api-hint a { color: var(--accent); }

.storage-box {
  padding: 12px 20px;
  border-bottom: 1px solid var(--border);
  background: var(--accent-pale);
}
.btn-clear {
  width: 100%;
  padding: 6px;
  background: none;
  border: 1px solid var(--red);
  color: var(--red);
  border-radius: var(--radius-sm);
  font-size: 11px;
  cursor: pointer;
  font-weight: 500;
  transition: all 0.15s;
}
.btn-clear:hover { background: var(--red-pale); }

.monthly-stats {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
}
.stats-title {
  font-size: 10px; color: var(--ink-muted); letter-spacing: 0.1em;
  text-transform: uppercase; margin-bottom: 12px;
}
.stat-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.stat-name { font-size: 12px; color: var(--ink-soft); }
.stat-val { font-size: 14px; font-weight: 500; color: var(--ink); }

.weight-chart-section {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
}
.chart-container {
  width: 100%;
  background: var(--cream);
  border-radius: var(--radius-sm);
  padding: 8px;
  margin-top: 8px;
}

.mood-summary { padding: 16px 20px; }
.mood-bar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.mood-bar-label { font-size: 12px; width: 48px; flex-shrink: 0; }
.mood-bar-track { flex: 1; height: 4px; background: var(--accent-pale); border-radius: 2px; overflow: hidden; }
.mood-bar-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.4s; }
.mood-bar-count { font-size: 11px; color: var(--ink-muted); width: 16px; text-align: right; }

/* ── Calendar ── */
.calendar-header {
  padding: 28px 32px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  background: var(--cream);
  z-index: 10;
}

.month-title {
  font-family: 'Noto Serif TC', serif;
  font-size: 26px;
  font-weight: 500;
  color: var(--ink);
}

.nav-btns { display: flex; gap: 8px; }
.nav-btn {
  width: 36px; height: 36px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--warm-white);
  cursor: pointer;
  color: var(--ink-soft);
  font-size: 16px;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
}
.nav-btn:hover { background: var(--accent-pale); border-color: var(--accent-light); color: var(--accent); }

.today-btn {
  padding: 6px 14px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--warm-white);
  cursor: pointer;
  font-size: 12px;
  color: var(--ink-soft);
  font-family: 'Noto Sans TC', sans-serif;
  transition: all 0.15s;
}
.today-btn:hover { background: var(--accent-pale); color: var(--accent); }

.weekday-row {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  padding: 12px 32px 0;
  gap: 4px;
}
.weekday-label {
  text-align: center;
  font-size: 11px;
  color: var(--ink-muted);
  letter-spacing: 0.08em;
  padding-bottom: 8px;
}

.calendar-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 4px;
  padding: 4px 32px 32px;
}

.day-cell {
  aspect-ratio: 1;
  min-height: 90px;
  background: var(--warm-white);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 8px;
  cursor: pointer;
  transition: all 0.15s;
  position: relative;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}
.day-cell:hover { border-color: var(--accent-light); box-shadow: 0 2px 12px var(--shadow); }
.day-cell.empty { background: transparent; border-color: transparent; cursor: default; }
.day-cell.today { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-pale); }
.day-cell.has-entry { background: var(--warm-white); }
.day-cell.selected { border-color: var(--accent); background: var(--accent-pale); }

.day-num {
  font-size: 13px;
  font-weight: 500;
  color: var(--ink-soft);
  line-height: 1;
  flex-shrink: 0;
}
.day-cell.today .day-num {
  background: var(--accent);
  color: white;
  width: 22px; height: 22px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px;
}

.day-mood { font-size: 14px; margin-top: 4px; }

.day-photo {
  flex: 1;
  margin-top: 4px;
  border-radius: 6px;
  object-fit: cover;
  width: 100%;
  min-height: 0;
}

.day-cal-badge {
  position: absolute;
  bottom: 6px; right: 6px;
  font-size: 9px;
  color: var(--ink-muted);
  background: var(--cream);
  padding: 1px 4px;
  border-radius: 4px;
}

.day-weight-badge {
  position: absolute;
  top: 6px; right: 6px;
  font-size: 10px;
  font-weight: 500;
  color: var(--accent);
  background: var(--accent-pale);
  padding: 1px 4px;
  border-radius: 4px;
}

/* ── Entry Panel ── */
.entry-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(28,26,24,0.4);
  z-index: 100;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.entry-overlay.open { display: flex; }

.entry-panel {
  background: var(--warm-white);
  border-radius: 20px;
  width: 100%;
  max-width: 560px;
  max-height: 90vh;
  overflow-y: auto;
  box-shadow: 0 20px 60px rgba(28,26,24,0.2);
  animation: slideUp 0.25s ease;
}
@keyframes slideUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }

.panel-header {
  padding: 20px 24px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky; top: 0;
  background: var(--warm-white);
  border-radius: 20px 20px 0 0;
}
.panel-date {
  font-family: 'Noto Serif TC', serif;
  font-size: 18px;
  font-weight: 500;
}
.panel-close {
  width: 32px; height: 32px;
  border: 1px solid var(--border);
  border-radius: 50%;
  background: none;
  cursor: pointer;
  font-size: 16px;
  color: var(--ink-muted);
  display: flex; align-items: center; justify-content: center;
}
.panel-close:hover { background: var(--accent-pale); color: var(--accent); }

.panel-body { padding: 20px 24px; }

.panel-section { margin-bottom: 20px; }
.panel-section-title {
  font-size: 10px;
  color: var(--ink-muted);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-bottom: 10px;
}

.weight-input-wrap {
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--cream);
  padding: 10px 14px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  max-width: 200px;
}
.weight-input {
  width: 100%;
  border: none;
  background: transparent;
  font-size: 16px;
  font-weight: 500;
  color: var(--ink);
  outline: none;
}
.weight-unit { font-size: 13px; color: var(--ink-muted); font-weight: 500; }

/* Meal rows */
.meal-item { margin-bottom: 12px; }
.meal-item-label {
  font-size: 11px;
  color: var(--ink-muted);
  margin-bottom: 6px;
  display: flex; align-items: center; gap: 6px;
}

.upload-zone {
  border: 1.5px dashed var(--accent-light);
  border-radius: var(--radius-sm);
  padding: 14px;
  text-align: center;
  cursor: pointer;
  position: relative;
  transition: background 0.15s;
  background: var(--accent-pale);
}
.upload-zone:hover { background: #E8D8C4; }
.upload-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
.upload-zone p { font-size: 12px; color: var(--accent); }

.text-only-btn {
  width: 100%;
  margin-top: 6px;
  padding: 6px;
  background: transparent;
  color: var(--green);
  border: 1px solid var(--green);
  border-radius: var(--radius-sm);
  font-size: 11px;
  cursor: pointer;
  font-weight: 500;
  transition: all 0.15s;
}
.text-only-btn:hover { background: var(--green-pale); }

.photo-preview { position: relative; }
.preview-img {
  width: 100%;
  max-height: 160px;
  object-fit: cover;
  border-radius: var(--radius-sm);
  display: block;
}
.remove-photo {
  position: absolute; top: 6px; right: 6px;
  background: rgba(28,26,24,0.6);
  border: none; border-radius: 50%;
  width: 24px; height: 24px;
  cursor: pointer; color: white; font-size: 13px;
  display: flex; align-items: center; justify-content: center;
}

.analyze-btn {
  width: 100%; margin-top: 8px;
  padding: 8px;
  background: var(--accent);
  color: white;
  border: none;
  border-radius: var(--radius-sm);
  font-size: 12px;
  font-family: 'Noto Sans TC', sans-serif;
  cursor: pointer;
  font-weight: 500;
  transition: background 0.15s;
}
.analyze-btn:hover { background: #7A5E38; }
.analyze-btn:disabled { opacity: 0.5; cursor: not-allowed; }

/* ── 營養分析盒子 ── */
.nutrition-box {
  margin-top: 8px;
  background: var(--green-pale);
  border-radius: var(--radius-sm);
  padding: 10px 12px;
}
.nutrition-name-input {
  width: 100%;
  border: 1px solid rgba(92, 122, 92, 0.2);
  background: var(--warm-white);
  font-size: 14px;
  font-weight: 500;
  color: var(--green);
  outline: none;
  padding: 4px 8px;
  border-radius: 4px;
  margin-bottom: 8px;
}
.nutrition-name-input:focus { border-color: var(--green); }

.nutrition-row { display: flex; gap: 6px; }
.nut { flex: 1; text-align: center; }
.nut-v { font-size: 14px; font-weight: 500; color: var(--ink); }
.nut-l { font-size: 9px; color: var(--ink-muted); margin-top: 1px; }
.nut-note { font-size: 10px; color: var(--ink-muted); margin-top: 6px; line-height: 1.5; }

.correction-wrap {
  margin-top: 10px;
  padding-top: 8px;
  border-top: 1px dashed rgba(92, 122, 92, 0.3);
  display: flex;
  gap: 6px;
}
.correction-input {
  flex: 1;
  padding: 6px 10px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 12px;
  font-family: 'Noto Sans TC', sans-serif;
  outline: none;
  background: var(--warm-white);
}
.correction-input:focus { border-color: var(--green); }
.btn-recalc {
  padding: 6px 12px;
  background: var(--green);
  color: white;
  border: none;
  border-radius: var(--radius-sm);
  font-size: 12px;
  cursor: pointer;
  font-weight: 500;
  white-space: nowrap;
  transition: background 0.15s;
}
.btn-recalc:hover { background: #4A634A; }

.loading-row { display: flex; align-items: center; gap: 8px; padding: 8px 0; }
.dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); animation: pulse 1s infinite; }
.dot:nth-child(2) { animation-delay: 0.2s; }
.dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes pulse { 0%,80%,100%{opacity:0.2} 40%{opacity:1} }
.loading-text { font-size: 12px; color: var(--ink-muted); }

/* Daily totals */
.totals-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  margin-bottom: 20px;
}
.total-box {
  background: var(--accent-pale);
  border-radius: var(--radius-sm);
  padding: 10px;
  text-align: center;
}
.total-v { font-size: 16px; font-weight: 500; color: var(--accent); }
.total-l { font-size: 9px; color: var(--ink-muted); margin-top: 2px; }

/* Mood picker */
.mood-opt {
  border: 1px solid var(--border);
  background: var(--cream);
  border-radius: 999px;
  padding: 6px 14px;
  font-size: 13px;
  cursor: pointer;
  transition: all 0.15s;
  font-family: 'Noto Sans TC', sans-serif;
}
.mood-opt:hover { border-color: var(--accent-light); background: var(--accent-pale); }
.mood-opt.active { background: var(--accent); color: white; border-color: var(--accent); }

/* Note */
.note-area {
  width: 100%;
  min-height: 80px;
  padding: 10px 12px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-family: 'Noto Sans TC', sans-serif;
  color: var(--ink);
  background: var(--cream);
  resize: none;
  outline: none;
  line-height: 1.7;
}
.note-area:focus { border-color: var(--accent-light); }
.note-area::placeholder { color: var(--ink-faint); }

.panel-footer {
  padding: 16px 24px;
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: flex-end;
  gap: 10px;
  position: sticky; bottom: 0;
  background: var(--warm-white);
  border-radius: 0 0 20px 20px;
}
.btn-save {
  padding: 9px 24px;
  background: var(--accent);
  color: white;
  border: none;
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-family: 'Noto Sans TC', sans-serif;
  cursor: pointer;
  font-weight: 500;
  transition: background 0.15s;
}
.btn-save:hover { background: #7A5E38; }
.btn-cancel {
  padding: 9px 16px;
  background: none;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-family: 'Noto Sans TC', sans-serif;
  cursor: pointer;
  color: var(--ink-soft);
}
.btn-cancel:hover { background: var(--cream); }

/* Toast */
.toast {
  position: fixed;
  bottom: 28px; left: 50%;
  transform: translateX(-50%);
  background: var(--ink);
  color: var(--cream);
  padding: 10px 20px;
  border-radius: 999px;
  font-size: 13px;
  opacity: 0;
  transition: opacity 0.3s;
  pointer-events: none;
  z-index: 999;
  white-space: nowrap;
}
.toast.show { opacity: 1; }
</style>
</head>
<body>

<div class="app">
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="app-title">我的生活日記</div>
      <div class="app-subtitle">MY LIFE JOURNAL</div>
    </div>

    <div class="api-section">
      <div class="api-label">Google Gemini API Key</div>
      <div class="api-input-wrap">
        <input type="password" class="api-input" id="api-key" placeholder="AIzaSy..." oninput="saveApiKey()" />
        <button class="api-toggle" id="api-toggle" onclick="toggleApiKey()">👁</button>
      </div>
